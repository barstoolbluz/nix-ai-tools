name: Publish Packages
on:
  workflow_run:
    workflows: ["Build Packages"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      packages:
        description: 'Specific packages to publish (space-separated, empty for all changed)'
        required: false
        default: ''
      all:
        description: 'Publish all packages'
        required: false
        type: boolean
        default: false

jobs:
  discover:
    # Only run on successful build workflow completion (or manual dispatch)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      has-packages: ${{ steps.detect.outputs.has-packages }}
    steps:
      - uses: actions/checkout@v4
        with:
          # For workflow_run events, check out the exact commit that triggered
          # the build workflow. Without this, checkout grabs the latest default
          # branch, which can drift if other PRs merge while the build is running.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Detect packages to publish
        id: detect
        run: |
          if [ "${{ inputs.all }}" = "true" ]; then
            packages=$(ls .flox/pkgs/*.nix .flox/pkgs/*/default.nix 2>/dev/null \
              | sed 's|.flox/pkgs/||; s|/default\.nix||; s|\.nix||' \
              | grep -v '^fetch-upstream$' \
              | grep -v '^go_1_' \
              | grep -v '^setup-hook$' \
              | sort -u)
          elif [ -n "${{ inputs.packages }}" ]; then
            packages="${{ inputs.packages }}"
          else
            changed=$(git diff --name-only HEAD~1 -- .flox/pkgs/ 2>/dev/null \
              | sed 's|.flox/pkgs/||; s|/.*||; s|\.nix||')

            # Expand dependency files into the packages that use them
            expanded=""
            if echo "$changed" | grep -q '^fetch-upstream$'; then
              expanded=$(printf '%s\n' claude-code-acp claude-desktop code codex codex-acp coderabbit-cli cursor-agent forge groq-code-cli kilocode-cli openspec openskills spec-kit)
            fi
            if echo "$changed" | grep -q '^go_1_'; then
              expanded=$(printf '%s\n%s' "$expanded" crush)
            fi

            packages=$(printf '%s\n%s' "$changed" "$expanded" \
              | grep -v '^fetch-upstream$' \
              | grep -v '^go_1_' \
              | grep -v '^setup-hook$' \
              | grep -v '^$' \
              | sort -u)
          fi

          if [ -z "$packages" ]; then
            echo "No packages to publish"
            echo "has-packages=false" >> "$GITHUB_OUTPUT"
            echo 'packages=[]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          json="["
          first=true
          for pkg in $packages; do
            [ "$first" = true ] && first=false || json+=","
            json+="\"$pkg\""
          done
          json+="]"

          echo "Packages to publish: $packages"
          echo "has-packages=true" >> "$GITHUB_OUTPUT"
          echo "packages=$json" >> "$GITHUB_OUTPUT"

  publish:
    needs: discover
    if: needs.discover.outputs.has-packages == 'true'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.discover.outputs.packages) }}
        runner:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          # Pin to the same commit the discover job used so we build/publish
          # the exact version that was validated by the build workflow.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Authenticate with FloxHub
        env:
          FLOX_AUTH_TOKEN: ${{ secrets.FLOX_AUTH_TOKEN }}
        run: |
          if [ -z "$FLOX_AUTH_TOKEN" ]; then
            echo "::error::FLOX_AUTH_TOKEN secret not configured."
            exit 1
          fi
          mkdir -p "$HOME/.config/flox"
          token=$(echo "$FLOX_AUTH_TOKEN" | tr -d '\n\r')
          printf 'floxhub_token = "%s"\n' "$token" > "$HOME/.config/flox/flox.toml"

      - name: Verify auth
        run: flox auth status

      - name: Build ${{ matrix.package }}
        id: build
        run: |
          echo "Building ${{ matrix.package }} on ${{ matrix.runner }}..."
          if flox build ${{ matrix.package }} 2>&1; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "Build failed (may be unsupported on this platform)"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish ${{ matrix.package }}
        if: steps.build.outputs.status == 'success'
        run: |
          echo "Publishing ${{ matrix.package }} on ${{ matrix.runner }}..."
          if flox publish -o flox ${{ matrix.package }} 2>&1; then
            echo "Published ${{ matrix.package }} successfully"
          else
            echo "::warning::Failed to publish ${{ matrix.package }}"
            exit 1
          fi

  summary:
    needs: [discover, publish]
    if: always() && needs.discover.outputs.has-packages == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Publish summary
        run: |
          echo "## Publish Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Packages: ${{ needs.discover.outputs.packages }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.publish.result }}" = "success" ]; then
            echo "All packages published successfully." >> $GITHUB_STEP_SUMMARY
          else
            echo "Some packages failed to publish. Check individual job logs." >> $GITHUB_STEP_SUMMARY
          fi
